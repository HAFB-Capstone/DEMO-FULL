# Drop terminal polling messages
[drop_terminal_polling]
REGEX = Checking logistics portal|No orders found \(404\)
DEST_KEY = queue
FORMAT = nullQueue

# Drop portal polling requests
[drop_portal_polling]
REGEX = GET /uploads/daily_maintenance\.sh
DEST_KEY = queue
FORMAT = nullQueue

# Drop status health checks
[drop_health_checks]
REGEX = GET /health
DEST_KEY = queue
FORMAT = nullQueue
