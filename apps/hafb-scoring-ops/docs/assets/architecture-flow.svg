<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09131C"/>
      <stop offset="1" stop-color="#081A25"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102434"/>
      <stop offset="1" stop-color="#0A1722"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#30D5C8"/>
      <stop offset="1" stop-color="#6FD8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#6FD8FF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 28px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #E8F4FF; }
      .subtitle { font: 500 14px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #8FA9BC; letter-spacing: 0.12em; text-transform: uppercase; }
      .node-title { font: 700 19px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #E8F4FF; }
      .node-copy { font: 500 13px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #BDD1E0; }
      .edge-label { font: 600 12px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #8FA9BC; }
      .badge { font: 700 12px 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #BFF7F3; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="472" rx="24" fill="none" stroke="rgba(111,216,255,0.12)"/>

  <text x="56" y="64" class="subtitle">Air-Gapped Scoring VM Architecture</text>
  <text x="56" y="104" class="title">HAFB Scoring Ops Data Flow</text>
  <text x="1004" y="66" class="badge">Internal Only</text>

  <rect x="64" y="150" width="220" height="86" rx="18" fill="url(#node)" stroke="#20425B" filter="url(#shadow)"/>
  <text x="86" y="184" class="node-title">Local Wazuh Samples</text>
  <text x="86" y="208" class="node-copy">Bootstrap and scenario JSON</text>

  <rect x="64" y="278" width="220" height="86" rx="18" fill="url(#node)" stroke="#20425B" filter="url(#shadow)"/>
  <text x="86" y="312" class="node-title">Internal Wazuh Exports</text>
  <text x="86" y="336" class="node-copy">Future manager or indexer feed</text>

  <rect x="64" y="406" width="220" height="86" rx="18" fill="url(#node)" stroke="#20425B" filter="url(#shadow)"/>
  <text x="86" y="440" class="node-title">Demo Scenario Control</text>
  <text x="86" y="464" class="node-copy">Deterministic exercise replay</text>

  <rect x="366" y="214" width="226" height="96" rx="18" fill="url(#node)" stroke="#2A5B74" filter="url(#shadow)"/>
  <text x="392" y="250" class="node-title">Ingestion Layer</text>
  <text x="392" y="275" class="node-copy">Loads internal files and staged</text>
  <text x="392" y="295" class="node-copy">telemetry into the scoring VM</text>

  <rect x="670" y="214" width="226" height="96" rx="18" fill="url(#node)" stroke="#2A5B74" filter="url(#shadow)"/>
  <text x="694" y="250" class="node-title">Normalization Layer</text>
  <text x="694" y="275" class="node-copy">Maps raw Wazuh records into</text>
  <text x="694" y="295" class="node-copy">incident, service, and severity fields</text>

  <rect x="944" y="118" width="220" height="96" rx="18" fill="url(#node)" stroke="#2A5B74" filter="url(#shadow)"/>
  <text x="970" y="154" class="node-title">Service Health Catalog</text>
  <text x="970" y="179" class="node-copy">Mission and telemetry checks</text>
  <text x="970" y="199" class="node-copy">for in-scope capstone services</text>

  <rect x="944" y="278" width="220" height="108" rx="18" fill="url(#node)" stroke="#30D5C8" filter="url(#shadow)"/>
  <text x="970" y="316" class="node-title">Incident State and Metrics</text>
  <text x="970" y="341" class="node-copy">Tracks open incidents, severity,</text>
  <text x="970" y="361" class="node-copy">service health, and operator summaries</text>

  <rect x="944" y="424" width="220" height="68" rx="18" fill="url(#node)" stroke="#30D5C8" filter="url(#shadow)"/>
  <text x="970" y="464" class="node-title">Scoring Model</text>

  <rect x="944" y="20" width="220" height="68" rx="18" fill="url(#node)" stroke="#30D5C8" filter="url(#shadow)"/>
  <text x="974" y="60" class="node-title">Operator Dashboard</text>

  <path d="M284 193H350C362 193 366 205 366 214V236" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M284 321H348C362 321 366 308 366 296V286" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M284 449H332C350 449 352 332 366 332H944" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M592 262H654C662 262 670 262 670 262" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M896 262H930C938 262 944 280 944 296" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1054 214V252" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1054 386V410" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1054 424V92" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="310" y="175" class="edge-label">load</text>
  <text x="312" y="340" class="edge-label">future</text>
  <text x="354" y="430" class="edge-label">drive scenario</text>
  <text x="614" y="246" class="edge-label">transform</text>
  <text x="916" y="248" class="edge-label">derive state</text>
  <text x="1070" y="240" class="edge-label">check impact</text>
  <text x="1070" y="408" class="edge-label">compute</text>
  <text x="1072" y="116" class="edge-label">display</text>
</svg>
