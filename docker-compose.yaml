# HAFB DEMO-FULL — red/blue scenario stack (all apps under ./apps)
# Port map avoids collisions: Splunk UI 9000, Log4j 8101–8103 + christophetd app 8180, MIL logistics 9080, payload 8001
name: hafb-demo

services:
  # ----- Blue team: Splunk Enterprise -----
  splunk:
    platform: linux/amd64
    build:
      context: ./apps/splunk/config
      dockerfile: Dockerfile
    hostname: splunk
    restart: unless-stopped
    tty: true
    environment:
      - SPLUNK_START_ARGS=--accept-license --no-kvstore
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-Changeme1!}
      - SPLUNK_USER=splunk
      - ANSIBLE_BECOME=false
    ports:
      - "8000:8000"
      - "9089:8089"
      - "9997:9997"
    volumes:
      - splunk_etc:/opt/splunk/etc
      - splunk_var:/opt/splunk/var
      - ./apps/splunk/analytics/rules:/opt/splunk/etc/apps/custom_rules:ro
      - ./apps/splunk/analytics/dashboards:/opt/splunk/etc/apps/search/local/data/ui/views:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/en-US/account/login"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - scenario

  # Serves Universal Forwarder packages + deploy script for bare-metal/Linux targets (port 8001)
  splunk-payloads:
    image: python:3.12-slim
    working_dir: /work
    command: ["python", "deployment/serve.py"]
    volumes:
      - ./apps/splunk/deployment:/work/deployment
    ports:
      - "8001:8001"
    environment:
      - PAYLOAD_SERVER_PORT=8001
      - PAYLOAD_SERVER_DIR=deployment
    networks:
      - scenario
    restart: unless-stopped

  # ----- MIL-STD-1553 vulnerable stack (zones / air-gap demo) -----
  logistics-portal:
    build: ./apps/MIL-STD-1553-Vulnerable/src/logistics-portal
    ports:
      - "9080:8080"
    volumes:
      - ./apps/MIL-STD-1553-Vulnerable/flags:/flags:ro
    networks:
      - mil1553-public
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  maintenance-terminal:
    build: ./apps/MIL-STD-1553-Vulnerable/src/maintenance-terminal
    networks:
      - mil1553-public
      - mil1553-avionics
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      - logistics-portal
      - serial-bus
    restart: unless-stopped

  serial-bus:
    build: ./apps/MIL-STD-1553-Vulnerable/src/serial-bus
    volumes:
      - ./apps/MIL-STD-1553-Vulnerable/src/serial-bus:/app
    ports:
      - "5001:5001/udp"
    networks:
      - mil1553-avionics
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ----- Log4j (CVE-2021-44228) lab services -----
  log4j-auth-service:
    build:
      context: ./apps/Log4j-Vulnerable/services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8101:8001"
    volumes:
      - ./apps/Log4j-Vulnerable/flags:/flags:ro
    networks:
      - log4j-net
    restart: unless-stopped

  log4j-inventory-service:
    build:
      context: ./apps/Log4j-Vulnerable/services/inventory-service
      dockerfile: Dockerfile
    ports:
      - "8102:8002"
    volumes:
      - ./apps/Log4j-Vulnerable/flags:/flags:ro
    networks:
      - log4j-net
    restart: unless-stopped

  log4j-status-service:
    build:
      context: ./apps/Log4j-Vulnerable/services/status-service
      dockerfile: Dockerfile
    ports:
      - "8103:8003"
    networks:
      - log4j-net
    restart: unless-stopped

  log4j-vulnerable-app:
    image: ghcr.io/christophetd/log4shell-vulnerable-app@sha256:6f88430688108e512f7405ac3c73d47f5c370780b94182854ea2cddc6bd59929
    ports:
      - "8180:8080"
    volumes:
      - ./apps/Log4j-Vulnerable/flags:/flags:ro
    networks:
      - log4j-net
    restart: unless-stopped

  # ----- RT-Log4j: attacker workstation + training UI (same network as Log4j lab) -----
  rt-log4j-attacker:
    platform: linux/amd64
    build:
      context: ./apps/RT-Log4j
      dockerfile: docker/attacker/Dockerfile
    hostname: rt-log4j-attacker
    working_dir: /app
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Reach published lab ports on the host (same mapping as localhost:8101–8103 from the host OS).
      - TARGET_HOST=host.docker.internal
      # Victim containers must resolve this hostname to pull LDAP/HTTP stages from marshalsec.
      - ATTACKER_HOST=rt-log4j-attacker
      - ATTACKER_PORT=9999
      - LOG4J_AUTH_PORT=8101
      - LOG4J_INVENTORY_PORT=8102
      - LOG4J_STATUS_PORT=8103
    volumes:
      - ./apps/RT-Log4j/tools:/app/tools
      - ./apps/RT-Log4j/config:/app/config
      - ./apps/RT-Log4j/loot:/app/loot
      - ./apps/RT-Log4j/logs:/app/logs
    networks:
      - log4j-net
    restart: unless-stopped

  rt-log4j-training-ui:
    image: nginx:alpine
    ports:
      # Avoid collision with Splunk UI on 8000 (standalone RT-Log4j compose uses 8000).
      - "8020:80"
    volumes:
      - ./apps/RT-Log4j/docs/training-ui:/usr/share/nginx/html:ro
    networks:
      - log4j-net
    restart: unless-stopped

  # ----- SBOM-XRay lab (CLI; bundled image tars via bind mount; isolated network) -----
  sbom-xray-lab:
    build:
      context: ./apps/SBOM-XRay
      dockerfile: docker/Dockerfile
    working_dir: /lab
    tty: true
    stdin_open: true
    volumes:
      - ./apps/SBOM-XRay:/lab:rw
    command: ["sleep", "infinity"]
    networks:
      - sbom-lab
    restart: unless-stopped

  # ----- Optional: Universal Forwarder containers (Docker “one UF per segment”) -----
  uf-mil1553:
    platform: linux/amd64
    image: splunk/universalforwarder:10.0.0
    hostname: uf-mil1553
    environment:
      - SPLUNK_START_ARGS=--accept-license --no-prompt
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_UF_PASSWORD:-ChangemeUF1!}
      - SPLUNK_STANDALONE_URL=splunk
    depends_on:
      splunk:
        condition: service_healthy
    networks:
      - scenario
    restart: unless-stopped
    profiles:
      - forwarders

  uf-log4j:
    platform: linux/amd64
    image: splunk/universalforwarder:10.0.0
    hostname: uf-log4j
    environment:
      - SPLUNK_START_ARGS=--accept-license --no-prompt
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_UF_PASSWORD:-ChangemeUF1!}
      - SPLUNK_STANDALONE_URL=splunk
    depends_on:
      splunk:
        condition: service_healthy
    networks:
      - scenario
    restart: unless-stopped
    profiles:
      - forwarders

  uf-scenario:
    platform: linux/amd64
    image: splunk/universalforwarder:10.0.0
    hostname: uf-scenario
    environment:
      - SPLUNK_START_ARGS=--accept-license --no-prompt
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_UF_PASSWORD:-ChangemeUF1!}
      - SPLUNK_STANDALONE_URL=splunk
    depends_on:
      splunk:
        condition: service_healthy
    networks:
      - scenario
    restart: unless-stopped
    profiles:
      - forwarders

volumes:
  splunk_etc:
    driver: local
  splunk_var:
    driver: local

networks:
  scenario:
    driver: bridge
  mil1553-public:
    driver: bridge
  mil1553-avionics:
    driver: bridge
    internal: true
  log4j-net:
    driver: bridge
  sbom-lab:
    driver: bridge
